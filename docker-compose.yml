# ============================================================================
# docker-compose.yml — Expense Tracker (Valendino)
#  Améliorez la configuration Docker Compose pour votre projet Expense Tracker.
# 1. Ajoutez un service pour la base de données PostgreSQL
# 2. Configurez les variables d'environnement pour la connexion à la base de données
# ============================================================================

services:

  # ===============================
  # SERVICE WEB (Node.js)
  # ===============================
  web:
    build:
      context: .
      dockerfile: Dockerfile   # Fichier Dockerfile à la racine

    container_name: expense-tracker-nodejs-valendino

    env_file:
      - .env.docker

    ports:
      - "3000:3000"   # Port externe:interne

    environment:
      NODE_ENV: ${NODE_ENV:-production}

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-expense_tracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - expense-tracker-network


  # ===============================
  # SERVICE DATABASE (PostgreSQL)
  # ===============================
  db:
    image: postgres:15-alpine   # Version légère PostgreSQL

    container_name: expense-tracker-db-valendino

    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-expense_tracker}
      POSTGRES_USER: ${DB_USER:-postgres}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

    networks:
      - expense-tracker-network


# ===============================
# VOLUMES (DATA PERSISTANTE)
# ===============================
volumes:
  postgres_data:
    driver: local


# ===============================
# NETWORK (COMMUNICATION)
# ===============================
networks:
  expense-tracker-network:
    driver: bridge